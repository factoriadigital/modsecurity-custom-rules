SecRule RESPONSE_BODY "(?i)<script>.*atob\s*\(\s*['\"][a-zA-Z0-9\+\/]{15,}={0,2}['\"]\s*\)" "id:1210000,phase:4,deny,log,msg:'PrestaShop skimmer detected: suspicious generic atob execution',tag:'malware_presta',severity:'CRITICAL'"
