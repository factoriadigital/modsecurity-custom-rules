# Bloquear cualquier ejecución de atob dentro de un script que parezca un skimmer
SecRule RESPONSE_BODY "(?i)<script>.*atob\s*\(\s*['\"][a-zA-Z0-9\+\/]{15,}={0,2}['\"]\s*\)" \
    "id:1210000, \
    phase:4, \
    deny, \
    log, \
    msg:'Skimmer de PrestaShop detectado: Ejecución genérica de atob sospechosa', \
    tag:'malware_presta', \
    severity:'CRITICAL'"

# Bloquear si el parámetro 'order' contiene algo que no sea el formato estándar de PrestaShop
SecRule ARGS:order "!@rx ^(product\.(position|name|price|date_add|reference)\.(asc|desc))?$" \
    "id:1210001, \
    phase:2, \
    deny, \
    status:403, \
    log, \
    msg:'Intento de inyección o parámetro de ordenación no válido en PrestaShop'"

# Bloquea intentos de meter scripts o rutas de archivos en la búsqueda de facetas
SecRule ARGS:q "(<|>|'|\"|\.\./|http:|https:)" \
    "id:1210002, \
    phase:2, \
    deny, \
    status:403, \
    log, \
    msg:'Caracteres ilegales detectados en el parámetro de búsqueda q'"

# Inicializar rastreo de IP
SecAction "id:100022,phase:1,nolog,pass,initcol:IP=%{REMOTE_ADDR}"

# Contar peticiones que contienen el parámetro 'q=' (Facetas)
SecRule ARGS:q "@gt 0" \
    "id:100023, \
    phase:2, \
    nolog, \
    pass, \
    setvar:IP.search_count=+1, \
    expirevar:IP.search_count=30"

# Bloquear si hace más de 15 peticiones de filtrado en 30 segundos
SecRule IP:search_count "@gt 15" \
    "id:100024, \
    phase:2, \
    deny, \
    status:429, \
    log, \
    msg:'Bloqueo temporal: Exceso de consultas al navegador de facetas'"
