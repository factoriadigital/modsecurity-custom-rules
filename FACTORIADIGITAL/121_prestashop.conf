# Block any atob execution inside a script that looks like a skimmer
SecRule RESPONSE_BODY "(?i)<script>.*atob\s*\(\s*['\"][a-zA-Z0-9\+\/]{15,}={0,2}['\"]\s*\)" "id:1210000,phase:4,deny,log,msg:'PrestaShop skimmer detected: suspicious generic atob execution',tag:'malware_presta',severity:'CRITICAL'"

# =====================================================================
# Anti-scraping de faceted search PrestaShop (ps_facetedsearch)
# IDs 1210002-1210014. Decisiones y contexto: ver AGENTS.md del repo.
# Todo en phase:1 (faceted search es GET; asi el gate cubre el bloque entero).
# =====================================================================

# Gate: el trafico que no toca faceted search salta todo el bloque
SecRule REQUEST_URI "!@rx [?&](?:q|resultsPerPage)=" \
    "id:1210002,phase:1,pass,nolog,t:none,skipAfter:FD_FACET_END"

# TPV de back-office (modulo AdminActionsTpvTienda): sus busquedas AJAX llevan q=
# y disparaban el rate limit (falso positivo, empleados en el TPV). Se exige el
# parametro controller= exacto: usarlo como bypass rompe el enrutado del front y
# no devuelve catalogo, asi que no sirve para scrapear.
SecRule ARGS:controller "@rx (?i)^AdminActionsTpvTienda$" \
    "id:1210016,phase:1,pass,nolog,t:none,skipAfter:FD_FACET_END"

# R6: rangos de datacenter de la botnet de scraping "lento" (Alibaba Cloud).
# Patron verificado 2026-07-21: cientos de IPs a 1 hit cada 10-15 min por IP, UA de Chrome
# falso, sin PTR -> invisible para R1-R5 por diseno. Solo trafico de facetas (gate previo);
# va antes que la exencion de bots buenos para que un UA falsificado no lo esquive.
SecRule REMOTE_ADDR "@ipMatch 47.79.0.0/16,47.82.0.0/16" \
    "id:1210017,phase:1,deny,status:403,log,t:none,\
    msg:'FD antiscraping: datacenter scraper en faceted search (%{REMOTE_ADDR})',tag:'fd-faceted-scraping'"

# R1: resultsPerPage fuera de rango sano (1-200) -> 403
SecRule ARGS:resultsPerPage "!@rx ^(?:[1-9][0-9]?|1[0-9]{2}|200)$" \
    "id:1210003,phase:1,deny,status:403,log,t:none,\
    msg:'FD antiscraping: resultsPerPage abusivo (%{MATCHED_VAR})',tag:'fd-faceted-scraping'"

# R2: 6 o mas grupos de faceta encadenados en q= -> 403
SecRule ARGS:q "@rx (?:[^/]*/){5,}" \
    "id:1210004,phase:1,deny,status:403,log,t:none,\
    msg:'FD antiscraping: exceso de grupos de faceta en q=',tag:'fd-faceted-scraping'"

# R3: q= anormalmente largo (>200 chars) -> 403
SecRule ARGS:q "@gt 200" \
    "id:1210005,phase:1,deny,status:403,log,t:none,t:length,\
    msg:'FD antiscraping: q= anormalmente largo',tag:'fd-faceted-scraping'"

# Bots buenos (solo por UA): exentos del rate limit (R4/R5), NO de R1-R3.
# Un UA falsificado solo esquiva el rate limit; los patrones abusivos se bloquean igual.
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(?:googlebot|bingbot|storebot-google|google-inspectiontool|applebot|duckduckbot)" \
    "id:1210006,phase:1,pass,nolog,t:none,skipAfter:FD_FACET_END"

# R4: rate limit por IP: mas de 15 hits de facetas en ventana fija de 10s -> 429.
# expirevar se aplica SOLO al crear la variable (ventana fija). No usar expirevar
# renovado ni deprecatevar: ambos acumulan sin limite bajo trafico sostenido (verificado).
SecAction "id:1210007,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR}"
SecRule &IP:fd_hits "@eq 0" \
    "id:1210008,phase:1,pass,nolog,t:none,setvar:ip.fd_hits=0,expirevar:ip.fd_hits=10"
SecAction "id:1210009,phase:1,pass,nolog,setvar:ip.fd_hits=+1"
SecRule IP:fd_hits "@gt 15" \
    "id:1210010,phase:1,deny,status:429,log,t:none,\
    msg:'FD antiscraping: rate limit por IP (%{ip.fd_hits} hits/10s)',tag:'fd-faceted-scraping'"

# R5: rate limit global por vhost (botnet distribuida): mas de 90 hits/10s -> 429.
# Va despues del deny de R4 a proposito: solo cuenta trafico que sobrevive a R1-R4.
SecAction "id:1210011,phase:1,pass,nolog,initcol:global=%{SERVER_NAME}"
SecRule &GLOBAL:fd_hits_all "@eq 0" \
    "id:1210012,phase:1,pass,nolog,t:none,setvar:global.fd_hits_all=0,expirevar:global.fd_hits_all=10"
SecAction "id:1210013,phase:1,pass,nolog,setvar:global.fd_hits_all=+1"
SecRule GLOBAL:fd_hits_all "@gt 90" \
    "id:1210014,phase:1,deny,status:429,log,t:none,\
    msg:'FD antiscraping: rate limit global vhost %{SERVER_NAME} (%{global.fd_hits_all} hits/10s)',tag:'fd-faceted-scraping'"

SecMarker FD_FACET_END
