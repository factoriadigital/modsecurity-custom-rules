# Block any atob execution inside a script that looks like a skimmer
SecRule RESPONSE_BODY "(?i)<script>.*atob\s*\(\s*['\"][a-zA-Z0-9\+\/]{15,}={0,2}['\"]\s*\)" "id:1210000,phase:4,deny,log,msg:'PrestaShop skimmer detected: suspicious generic atob execution',tag:'malware_presta',severity:'CRITICAL'"

# Block if the 'order' parameter contains anything other than PrestaShop's standard format
SecRule ARGS:order "!@rx ^(product\.(position|name|price|date_add|reference)\.(asc|desc))?$" "id:1210001,phase:2,deny,status:403,log,msg:'Injection attempt or invalid sort parameter in PrestaShop'"